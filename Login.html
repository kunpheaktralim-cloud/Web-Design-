<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex items-center justify-center bg-gradient-to-r from-pink-500 to-red-500">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-80">
        <form>
            <h1 class="text-2xl font-bold text-center text-pink-500 mb-6">
                Login
            </h1>

            <!-- Username -->
            <div class="mb-4">
                <input type="text" placeholder="Username"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400"
                    required>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <input type="password" placeholder="Password"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400"
                    required>
            </div>

            <!-- Options -->
            <div class="flex justify-between items-center text-sm mb-4">
                <label class="flex items-center gap-1">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="text-pink-500 hover:underline">
                    Forgot password?
                </a>
            </div>

            <!-- Button -->
            <button type="submit"
                class="w-full bg-pink-500 text-white p-3 rounded-lg hover:bg-red-500 transition">
                Login
            </button>

            <!-- Register -->
            <p class="text-sm text-center mt-4">
                Don't have an account?
                <a href="#" class="text-pink-500 font-semibold hover:underline">
                    Register
                </a>
            </p>
        </form>
    </div>

</body>
</html>
