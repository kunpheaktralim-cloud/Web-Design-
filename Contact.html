<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

  <!-- Navbar -->
  <nav class="bg-gray-900 text-white p-4 flex justify-between">
    <h1 class="font-bold">MyRestaurant</h1>
    <div class="space-x-4">
      <a href="index.html">Home</a>
      <a href="Menu.html">Menu</a>
      <a href="Event.html">Event</a>
      <a href="Contact.html">Contact</a>
    </div>
  </nav>

  <!-- Content -->
  <section class="max-w-6xl mx-auto px-6 py-12">
    <h1 class="text-4xl font-bold mb-3">Contact Us</h1>
    <p class="text-gray-600 mb-10">We'd love to welcome you.</p>

    <div class="grid md:grid-cols-2 gap-8">

      <!-- Left -->
      <div class="bg-white rounded-2xl shadow p-8">
        <h2 class="text-2xl font-semibold mb-4">Restaurant Details</h2>
        <p class="mb-3">Authentic Khmer dining with modern comfort.</p>
        <p><strong>Address:</strong> Phnom Penh, Cambodia</p>
        <p><strong>Phone:</strong> +855 xx xxx xxx</p>
        <p><strong>Email:</strong> hello@restaurant.com</p>
        <p><strong>Hours:</strong> 10:00 AM - 10:00 PM</p>
      </div>

      <!-- Right -->
      <div class="bg-white rounded-2xl shadow p-8">
        <h2 class="text-2xl font-semibold mb-4">Send a Message</h2>

        <form class="space-y-4">
          <input type="text" placeholder="Your name"
            class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-500">

          <input type="email" placeholder="Your email"
            class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-500">

          <textarea placeholder="Your message"
            class="w-full border rounded-lg p-3 h-32 focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>

          <button class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 w-full">
            Send Message
          </button>
        </form>
      </div>

    </div>
  </section>

</body>
</html>
